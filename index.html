<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Shop — Premium ecommerce storefront. Discover curated collections, fast checkout, and a polished shopping experience." />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Shop — Premium Ecommerce Storefront" />
    <meta property="og:description" content="Discover curated collections, flexible checkout, and a polished shopping experience." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://shop.example.com/og-image.png" />
    <meta property="og:url" content="https://shop.example.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shop — Premium Ecommerce Storefront" />
    <meta name="twitter:description" content="Discover curated collections, flexible checkout, and a polished shopping experience." />
    <meta name="twitter:image" content="https://shop.example.com/og-image.png" />
    <link rel="canonical" href="https://shop.example.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Shop",
      "url": "https://shop.example.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://shop.example.com/products?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Shop",
      "url": "https://shop.example.com",
      "logo": "https://shop.example.com/logo.png"
    }
    </script>
    <title>Shop</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
